<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Arial, sans-serif">
  <title>Diagrama Entidad-Relaci&#243;n - Plataforma Intercambios Acad&#233;micos</title>
  <desc>Diagrama ER mostrando las entidades Usuario, Convocatoria, Postulaci&#243;n, Documento y Notificaci&#243;n y sus relaciones.</desc>

  <defs>
    <marker id="one" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="14" markerHeight="14" orient="auto">
      <line x1="6" y1="0" x2="6" y2="12" stroke="#0f172a" stroke-width="1.5"/>
    </marker>
    <marker id="many" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 7 L 13 0 M 0 7 L 13 7 M 0 7 L 13 14" stroke="#0f172a" stroke-width="1.5" fill="none"/>
    </marker>
  </defs>

  <!-- T&#237;tulo -->
  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">
    Diagrama Entidad-Relaci&#243;n
  </text>
  <text x="600" y="54" text-anchor="middle" font-size="13" fill="#475569">
    Modelo de datos PostgreSQL &#183; SQLAlchemy ORM
  </text>

  <!-- ============ USUARIO ============ -->
  <g>
    <rect x="60" y="100" width="240" height="240" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <rect x="60" y="100" width="240" height="34" rx="8" fill="#d97706"/>
    <text x="180" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">USUARIO</text>
    <line x1="60" y1="134" x2="300" y2="134" stroke="#d97706" stroke-width="1"/>
    <text x="75" y="155" font-size="11" font-weight="700" fill="#92400e">PK</text>
    <text x="105" y="155" font-size="11" fill="#1e293b">id_usuario : INT</text>
    <text x="75" y="175" font-size="11" fill="#1e293b">cedula : VARCHAR(20)</text>
    <text x="75" y="195" font-size="11" fill="#1e293b">nombre : VARCHAR(100)</text>
    <text x="75" y="215" font-size="11" fill="#1e293b">correo : VARCHAR(120) UQ</text>
    <text x="75" y="235" font-size="11" fill="#1e293b">password_hash : TEXT</text>
    <text x="75" y="255" font-size="11" fill="#1e293b">celular : VARCHAR(20)</text>
    <text x="75" y="275" font-size="11" fill="#1e293b">semestre : INT</text>
    <text x="75" y="295" font-size="11" fill="#1e293b">programa : VARCHAR(80)</text>
    <text x="75" y="315" font-size="11" fill="#1e293b">rol : ENUM(estud,admin)</text>
    <text x="75" y="333" font-size="11" fill="#1e293b">fecha_registro : TIMESTAMP</text>
  </g>

  <!-- ============ CONVOCATORIA ============ -->
  <g>
    <rect x="900" y="100" width="240" height="240" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
    <rect x="900" y="100" width="240" height="34" rx="8" fill="#1d4ed8"/>
    <text x="1020" y="123" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">CONVOCATORIA</text>
    <line x1="900" y1="134" x2="1140" y2="134" stroke="#1d4ed8" stroke-width="1"/>
    <text x="915" y="155" font-size="11" font-weight="700" fill="#1e3a8a">PK</text>
    <text x="945" y="155" font-size="11" fill="#1e293b">id_convocatoria : INT</text>
    <text x="915" y="175" font-size="11" fill="#1e293b">titulo : VARCHAR(150)</text>
    <text x="915" y="195" font-size="11" fill="#1e293b">descripcion : TEXT</text>
    <text x="915" y="215" font-size="11" fill="#1e293b">pais : VARCHAR(60)</text>
    <text x="915" y="235" font-size="11" fill="#1e293b">universidad : VARCHAR(120)</text>
    <text x="915" y="255" font-size="11" fill="#1e293b">fecha_inicio : DATE</text>
    <text x="915" y="275" font-size="11" fill="#1e293b">fecha_fin : DATE</text>
    <text x="915" y="295" font-size="11" fill="#1e293b">requisitos : TEXT</text>
    <text x="915" y="315" font-size="11" fill="#1e293b">cupos : INT</text>
    <text x="915" y="333" font-size="11" fill="#1e293b">estado : ENUM(act,cer)</text>
  </g>

  <!-- ============ POSTULACION ============ -->
  <g>
    <rect x="480" y="380" width="240" height="200" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <rect x="480" y="380" width="240" height="34" rx="8" fill="#15803d"/>
    <text x="600" y="403" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">POSTULACI&#211;N</text>
    <line x1="480" y1="414" x2="720" y2="414" stroke="#15803d" stroke-width="1"/>
    <text x="495" y="435" font-size="11" font-weight="700" fill="#14532d">PK</text>
    <text x="525" y="435" font-size="11" fill="#1e293b">id_postulacion : INT</text>
    <text x="495" y="455" font-size="11" font-weight="700" fill="#14532d">FK</text>
    <text x="525" y="455" font-size="11" fill="#1e293b">id_usuario</text>
    <text x="495" y="475" font-size="11" font-weight="700" fill="#14532d">FK</text>
    <text x="525" y="475" font-size="11" fill="#1e293b">id_convocatoria</text>
    <text x="495" y="495" font-size="11" fill="#1e293b">estado : ENUM(rev,apr,rec)</text>
    <text x="495" y="515" font-size="11" fill="#1e293b">fecha_postulacion : TS</text>
    <text x="495" y="535" font-size="11" fill="#1e293b">observaciones : TEXT</text>
    <text x="495" y="555" font-size="11" fill="#1e293b">fecha_actualizacion : TS</text>
    <text x="495" y="573" font-size="11" fill="#1e293b">puntaje : DECIMAL(4,2)</text>
  </g>

  <!-- ============ DOCUMENTO ============ -->
  <g>
    <rect x="120" y="620" width="240" height="170" rx="8" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
    <rect x="120" y="620" width="240" height="34" rx="8" fill="#6d28d9"/>
    <text x="240" y="643" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">DOCUMENTO</text>
    <line x1="120" y1="654" x2="360" y2="654" stroke="#6d28d9" stroke-width="1"/>
    <text x="135" y="675" font-size="11" font-weight="700" fill="#4c1d95">PK</text>
    <text x="165" y="675" font-size="11" fill="#1e293b">id_documento : INT</text>
    <text x="135" y="695" font-size="11" font-weight="700" fill="#4c1d95">FK</text>
    <text x="165" y="695" font-size="11" fill="#1e293b">id_postulacion</text>
    <text x="135" y="715" font-size="11" fill="#1e293b">nombre_archivo : VARCHAR</text>
    <text x="135" y="735" font-size="11" fill="#1e293b">ruta : TEXT</text>
    <text x="135" y="755" font-size="11" fill="#1e293b">tipo : VARCHAR(20)</text>
    <text x="135" y="775" font-size="11" fill="#1e293b">fecha_subida : TIMESTAMP</text>
  </g>

  <!-- ============ NOTIFICACION ============ -->
  <g>
    <rect x="840" y="620" width="240" height="170" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
    <rect x="840" y="620" width="240" height="34" rx="8" fill="#be185d"/>
    <text x="960" y="643" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">NOTIFICACI&#211;N</text>
    <line x1="840" y1="654" x2="1080" y2="654" stroke="#be185d" stroke-width="1"/>
    <text x="855" y="675" font-size="11" font-weight="700" fill="#831843">PK</text>
    <text x="885" y="675" font-size="11" fill="#1e293b">id_notificacion : INT</text>
    <text x="855" y="695" font-size="11" font-weight="700" fill="#831843">FK</text>
    <text x="885" y="695" font-size="11" fill="#1e293b">id_usuario</text>
    <text x="855" y="715" font-size="11" fill="#1e293b">mensaje : TEXT</text>
    <text x="855" y="735" font-size="11" fill="#1e293b">tipo : VARCHAR(40)</text>
    <text x="855" y="755" font-size="11" fill="#1e293b">leida : BOOLEAN</text>
    <text x="855" y="775" font-size="11" fill="#1e293b">fecha_creacion : TIMESTAMP</text>
  </g>

  <!-- ============ RELACIONES ============ -->

  <!-- Usuario (1) -> Postulacion (N) -->
  <path d="M 240 340 L 240 410 L 480 460" stroke="#0f172a" stroke-width="2" fill="none" marker-start="url(#one)" marker-end="url(#many)"/>
  <rect x="280" y="378" width="60" height="22" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="1"/>
  <text x="310" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">1 : N</text>
  <text x="350" y="367" font-size="10" font-style="italic" fill="#475569">realiza</text>

  <!-- Convocatoria (1) -> Postulacion (N) -->
  <path d="M 1020 340 L 1020 410 L 720 460" stroke="#0f172a" stroke-width="2" fill="none" marker-start="url(#one)" marker-end="url(#many)"/>
  <rect x="860" y="378" width="60" height="22" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="1"/>
  <text x="890" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">1 : N</text>
  <text x="820" y="367" font-size="10" font-style="italic" fill="#475569">recibe</text>

  <!-- Postulacion (1) -> Documento (N) -->
  <path d="M 540 580 L 540 610 L 280 620" stroke="#0f172a" stroke-width="2" fill="none" marker-start="url(#one)" marker-end="url(#many)"/>
  <rect x="370" y="595" width="60" height="22" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="1"/>
  <text x="400" y="611" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">1 : N</text>
  <text x="420" y="585" font-size="10" font-style="italic" fill="#475569">adjunta</text>

  <!-- Usuario (1) -> Notificacion (N) -->
  <path d="M 300 320 Q 600 350 840 670" stroke="#0f172a" stroke-width="2" fill="none" stroke-dasharray="0" marker-start="url(#one)" marker-end="url(#many)"/>
  <rect x="640" y="430" width="60" height="22" rx="4" fill="#ffffff" stroke="#0f172a" stroke-width="1"/>
  <text x="670" y="446" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">1 : N</text>
  <text x="700" y="418" font-size="10" font-style="italic" fill="#475569">recibe</text>

  <!-- Leyenda -->
  <g transform="translate(60, 800)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#0f172a">PK = Primary Key</text>
    <text x="140" y="0" font-size="11" font-weight="700" fill="#0f172a">FK = Foreign Key</text>
    <text x="290" y="0" font-size="11" font-weight="700" fill="#0f172a">UQ = Unique</text>
    <text x="400" y="0" font-size="11" fill="#475569">&#183; Cardinalidad notaci&#243;n &quot;pata de gallo&quot; (Crow&apos;s Foot)</text>
  </g>
</svg>
