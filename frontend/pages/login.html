<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión - Intercambios UPC</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">🎓 Intercambios UPC</a>
    <ul class="nav-links">
      <li><a href="index.html">Convocatorias</a></li>
      <li><a href="login.html" class="activo">Iniciar Sesión</a></li>
      <li><a href="registro.html">Registrarme</a></li>
    </ul>
  </nav>

  <main>
    <div class="form-container">
      <div class="card">
        <div class="text-center mb-3">
          <div style="font-size:3rem; margin-bottom:0.5rem;">🎓</div>
          <h1 style="font-size:1.5rem; color:#1a3a6b; margin-bottom:0.3rem;">Bienvenido de vuelta</h1>
          <p style="color:#6b7280; font-size:0.9rem;">Ingresa a tu cuenta para gestionar tus postulaciones</p>
        </div>

        <div id="alerta" style="display:none;"></div>

        <form id="form-login" onsubmit="iniciarSesion(event)">
          <div class="form-group">
            <label for="email">Correo institucional</label>
            <input type="email" id="email" placeholder="ejemplo@upc.edu.co" required />
          </div>
          <div class="form-group">
            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" placeholder="Tu contraseña" required />
          </div>
          <button type="submit" class="btn btn-primario btn-bloque btn-submit" id="btn-login">
            Iniciar sesión
          </button>
        </form>

        <div class="form-pie mt-2">
          ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>Universidad Piloto de Colombia &mdash; Programa de Desarrollo Web &mdash; 2026</p>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    async function iniciarSesion(e) {
      e.preventDefault();
      const btn    = document.getElementById("btn-login");
      const alerta = document.getElementById("alerta");

      btn.disabled    = true;
      btn.textContent = "Verificando...";
      alerta.style.display = "none";

      try {
        const data = await apiFetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email:      document.getElementById("email").value.trim(),
            contrasena: document.getElementById("contrasena").value
          })
        });

        setSession(data.token, {
          nombre:   data.nombre,
          apellido: data.apellido,
          email:    data.email,
          rol:      data.rol
        });

        if (data.rol === "administrador") {
          window.location.href = "admin/panel.html";
        } else {
          window.location.href = "index.html";
        }

      } catch (err) {
        alerta.style.display = "block";
        mostrarError(alerta, err.message || "Correo o contraseña incorrectos");
        btn.disabled    = false;
        btn.textContent = "Iniciar sesión";
      }
    }
  </script>
</body>
</html>
