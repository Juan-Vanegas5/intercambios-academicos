<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro - Intercambios UPC</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- NAVEGACIÓN -->
  <nav>
    <a href="index.html" class="nav-logo">🎓 Intercambios UPC</a>
    <ul class="nav-links">
      <li><a href="index.html">Convocatorias</a></li>
      <li><a href="login.html">Iniciar Sesión</a></li>
      <li><a href="registro.html" class="activo">Registrarme</a></li>
    </ul>
  </nav>

  <main>
    <div class="form-container" style="max-width:560px;">
      <div class="card">

        <div class="text-center mb-3">
          <div style="font-size:2.5rem; margin-bottom:0.5rem;">📝</div>
          <h1 style="font-size:1.5rem; color:#1a3a6b; margin-bottom:0.3rem;">Crear cuenta</h1>
          <p style="color:#6b7280; font-size:0.9rem;">Regístrate para postularte a intercambios académicos</p>
        </div>

        <form id="form-registro" onsubmit="registrar(event)">

          <div class="form-fila">
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" placeholder="Ej: Juan Andrés" required />
            </div>
            <div class="form-group">
              <label for="apellido">Apellido</label>
              <input type="text" id="apellido" placeholder="Ej: Vanegas" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email">Correo institucional</label>
            <input type="email" id="email" placeholder="ejemplo@upc.edu.co" required />
          </div>

          <div class="form-fila">
            <div class="form-group">
              <label for="cedula">Cédula de ciudadanía</label>
              <input type="text" id="cedula" placeholder="Ej: 1234567890" required />
            </div>
            <div class="form-group">
              <label for="celular">Número celular</label>
              <input type="tel" id="celular" placeholder="Ej: 3001234567" required />
            </div>
          </div>

          <div class="form-fila">
            <div class="form-group">
              <label for="codigo">Código estudiantil</label>
              <input type="text" id="codigo" placeholder="Ej: 201923456" required />
            </div>
            <div class="form-group">
              <label for="programa">Programa académico</label>
              <select id="programa" required>
                <option value="">Seleccionar...</option>
                <option>Ingeniería de Sistemas</option>
                <option>Ingeniería Civil</option>
                <option>Arquitectura</option>
                <option>Administración de Empresas</option>
                <option>Derecho</option>
                <option>Psicología</option>
                <option>Medicina</option>
                <option>Otro</option>
              </select>
            </div>
          </div>

          <div class="form-fila">
            <div class="form-group">
              <label for="contrasena">Contraseña</label>
              <input type="password" id="contrasena" placeholder="Mínimo 6 caracteres" required minlength="6" />
            </div>
            <div class="form-group">
              <label for="confirmar">Confirmar contraseña</label>
              <input type="password" id="confirmar" placeholder="Repite tu contraseña" required />
            </div>
          </div>

          <div id="alerta-registro"></div>

          <button type="submit" class="btn btn-primario btn-bloque btn-submit">
            Crear cuenta
          </button>
        </form>

        <div class="form-pie mt-2">
          ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>

      </div>
    </div>
  </main>

  <footer>
    <p>Universidad Piloto de Colombia &mdash; Programa de Desarrollo Web &mdash; 2026</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    function validarEmail(email) {
      const regex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;
      return regex.test(email.trim());
    }

    function validarSoloLetras(valor) {
      // Permite letras, tildes, ñ y espacios — no números ni símbolos
      return /^[a-zA-ZáéíóúÁÉÍÓÚüÜñÑ\s]+$/.test(valor.trim());
    }

    function aplicarValidacionTexto(inputEl, alerta) {
      inputEl.addEventListener('blur', function () {
        const val = inputEl.value.trim();
        if (val && !validarSoloLetras(val)) {
          alerta.className = 'alerta alerta-error';
          alerta.textContent = `El campo "${inputEl.previousElementSibling.textContent}" no puede contener números ni símbolos.`;
          inputEl.style.borderColor = '#dc2626';
        } else {
          if (alerta.textContent.includes(inputEl.previousElementSibling.textContent)) {
            alerta.textContent = '';
            alerta.className = '';
          }
          inputEl.style.borderColor = '';
        }
      });

      inputEl.addEventListener('input', function () {
        if (inputEl.style.borderColor === 'rgb(220, 38, 38)' && validarSoloLetras(inputEl.value.trim())) {
          alerta.textContent = '';
          alerta.className = '';
          inputEl.style.borderColor = '';
        }
      });
    }

    // Validación en tiempo real
    document.addEventListener('DOMContentLoaded', function () {
      const inputEmail   = document.getElementById('email');
      const inputNombre  = document.getElementById('nombre');
      const inputApellido = document.getElementById('apellido');
      const alerta = document.getElementById('alerta-registro');

      // Validación email
      inputEmail.addEventListener('blur', function () {
        const val = inputEmail.value.trim();
        if (val && !validarEmail(val)) {
          alerta.className = 'alerta alerta-error';
          alerta.textContent = 'El correo no es válido. Debe tener el formato: ejemplo@dominio.com';
          inputEmail.style.borderColor = '#dc2626';
        } else {
          alerta.textContent = '';
          alerta.className = '';
          inputEmail.style.borderColor = '';
        }
      });

      inputEmail.addEventListener('input', function () {
        if (inputEmail.style.borderColor === 'rgb(220, 38, 38)' && validarEmail(inputEmail.value.trim())) {
          alerta.textContent = '';
          alerta.className = '';
          inputEmail.style.borderColor = '';
        }
      });

      // Validación nombre y apellido
      aplicarValidacionTexto(inputNombre, alerta);
      aplicarValidacionTexto(inputApellido, alerta);

      // Cédula: solo números
      const inputCedula = document.getElementById('cedula');
      inputCedula.addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9]/g, '');
      });

      // Celular: solo números y +
      const inputCelular = document.getElementById('celular');
      inputCelular.addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9+]/g, '');
      });

      // Código estudiantil: solo números
      const inputCodigo = document.getElementById('codigo');
      inputCodigo.addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9]/g, '');
      });
    });

    async function registrar(e) {
      e.preventDefault();
      const contrasena = document.getElementById('contrasena').value;
      const confirmar  = document.getElementById('confirmar').value;
      const email      = document.getElementById('email').value.trim();
      const nombre     = document.getElementById('nombre').value.trim();
      const apellido   = document.getElementById('apellido').value.trim();
      const alerta     = document.getElementById('alerta-registro');
      const btn        = document.querySelector('#form-registro button[type="submit"]');

      if (!validarSoloLetras(nombre)) {
        alerta.className = 'alerta alerta-error';
        alerta.textContent = 'El nombre no puede contener números ni símbolos.';
        document.getElementById('nombre').style.borderColor = '#dc2626';
        document.getElementById('nombre').focus();
        return;
      }

      if (!validarSoloLetras(apellido)) {
        alerta.className = 'alerta alerta-error';
        alerta.textContent = 'El apellido no puede contener números ni símbolos.';
        document.getElementById('apellido').style.borderColor = '#dc2626';
        document.getElementById('apellido').focus();
        return;
      }

      if (!validarEmail(email)) {
        alerta.className = 'alerta alerta-error';
        alerta.textContent = 'El correo no es válido. Debe tener el formato: ejemplo@dominio.com';
        document.getElementById('email').style.borderColor = '#dc2626';
        document.getElementById('email').focus();
        return;
      }

      if (contrasena !== confirmar) {
        alerta.className = 'alerta alerta-error';
        alerta.textContent = 'Las contraseñas no coinciden.';
        return;
      }

      alerta.textContent = '';
      btn.disabled    = true;
      btn.textContent = 'Creando cuenta...';

      try {
        const data = await apiFetch('/api/auth/registro', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre:     document.getElementById('nombre').value.trim(),
            apellido:   document.getElementById('apellido').value.trim(),
            email:      document.getElementById('email').value.trim(),
            contrasena: contrasena,
            cedula:     document.getElementById('cedula').value.trim(),
            celular:    document.getElementById('celular').value.trim(),
            codigo:     document.getElementById('codigo').value.trim(),
            programa:   document.getElementById('programa').value
          })
        });
        setSession(data.token, {
          nombre: data.nombre, apellido: data.apellido,
          email: data.email, rol: data.rol
        });
        window.location.href = 'index.html';
      } catch (err) {
        alerta.className = 'alerta alerta-error';
        alerta.textContent = err.message || 'Error al crear la cuenta.';
        btn.disabled    = false;
        btn.textContent = 'Crear cuenta';
      }
    }
  </script>
</body>
</html>
